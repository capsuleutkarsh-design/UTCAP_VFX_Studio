<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UT VFX | Cinematic Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* Prevent scrolling or selecting */
            user-select: none;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Cinematic Overlay UI */
        .overlay {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .brand {
            font-size: clamp(2rem, 8vw, 5rem);
            letter-spacing: 2rem;
            font-weight: 100;
            text-transform: uppercase;
            text-shadow: 0 0 40px rgba(0, 255, 150, 0.3);
            margin-left: 2rem;
            opacity: 0.8;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
        }

        /* Shift the brand up slightly once loading finishes */
        .brand.loaded {
            transform: translateY(-80px) scale(0.9);
            opacity: 0.4;
            text-shadow: 0 0 20px rgba(0, 255, 150, 0.1);
        }

        .status-area {
            position: fixed;
            bottom: 60px;
            text-align: center;
            z-index: 20;
            width: 100%;
            transition: opacity 0.8s ease;
        }

        .status-text {
            font-size: 0.6rem;
            letter-spacing: 0.6rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 15px;
            transition: color 0.3s ease;
        }

        .status-text.pulse {
            animation: pulse 1.5s infinite alternate;
            font-size: 1rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            100% { opacity: 1.0; transform: scale(1.02); }
        }

        .progress-line {
            width: 300px;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 0 auto;
            position: relative;
        }

        #fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transition: width 0.3s ease-out;
        }

        /* Anamorphic Flare */
        .flare {
            position: fixed;
            top: 50%; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.3), #fff, rgba(0, 242, 255, 0.3), transparent);
            z-index: 5;
            filter: blur(1px);
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="glCanvas"></canvas>
    <div class="flare"></div>

    <div class="overlay">
        <h1 class="brand" id="brandText">UT VFX</h1>
    </div>

    <div class="status-area" id="statusArea">
        <div class="status-text" id="status-msg">Initializing Singularity</div>
        <div class="progress-line">
            <div id="fill"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            console.error("WebGL not supported");
        }

        // --- SHADER SOURCE ---
        const vertSrc = `
            attribute vec2 position;
            void main() {
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;

        const fragSrc = `
            precision highp float;
            uniform vec2 u_res;
            uniform float u_time;
            uniform vec2 u_mouse;
            uniform float u_intensity;

            // Fractal Noise Functions
            float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
            
            float noise(vec2 p) {
                vec2 i = floor(p); vec2 f = fract(p);
                f = f*f*(3.0-2.0*f);
                return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), 
                           mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
            }

            float fbm(vec2 p) {
                float v = 0.0; float a = 0.5;
                for (int i = 0; i < 6; i++) {
                    v += a * noise(p);
                    p *= 2.1; a *= 0.5;
                }
                return v;
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / u_res;
                vec2 p = (uv - 0.5) * vec2(u_res.x / u_res.y, 1.0);
                
                // 1. Swirling Movement (The Jupiter effect)
                float n = fbm(p * 1.2 + u_time * 0.05);
                
                // 2. Vibrant Color Palette (Inspired by your images)
                // Emerald Green
                vec3 green = vec3(0.1, 0.9, 0.4) * pow(fbm(p + n + u_time * 0.02), 3.0);
                // Electric Cyan
                vec3 cyan = vec3(0.0, 0.6, 1.0) * pow(fbm(p - n - u_time * 0.01), 2.0);
                // Burnt Orange Accents
                vec3 orange = vec3(1.0, 0.4, 0.1) * pow(fbm(p * 2.0 + n), 4.0);

                // Mix colors based on noise patterns
                vec3 col = green + cyan + orange;

                // 3. Central "Singularity" shadow
                float dist = length(p);
                float mask = smoothstep(0.05, 0.4, dist);
                col *= mask;

                // Rim glow
                col += vec3(0.8, 1.0, 0.9) * (0.005 / abs(dist - 0.15));

                // Contrast & Brightness
                col = pow(col, vec3(0.8)); // Gamma
                col *= (1.0 + u_intensity); // Intensity based on uniform

                gl_FragColor = vec4(col, 1.0);
            }
        `;

        // --- WEBGL INITIALIZATION ---
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vertSrc));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fragSrc));
        gl.linkProgram(program);
        gl.useProgram(program);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

        const pos = gl.getAttribLocation(program, "position");
        gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

        const uRes = gl.getUniformLocation(program, "u_res");
        const uTime = gl.getUniformLocation(program, "u_time");
        const uIntensity = gl.getUniformLocation(program, "u_intensity");

        let intensityValue = 0.4; // Default baseline intensity

        // --- RENDER LOOP ---
        function render(time) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);

            gl.uniform2f(uRes, canvas.width, canvas.height);
            gl.uniform1f(uTime, time * 0.001);
            gl.uniform1f(uIntensity, intensityValue);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);

        // --- EXPOSED API FOR PYSIDE6 ---
        const fill = document.getElementById('fill');
        const msg = document.getElementById('status-msg');
        const statusArea = document.getElementById('statusArea');
        const brandText = document.getElementById('brandText');

        // Call this from Python: view.page().runJavaScript(`setLoadingProgress(50, "Loading UI...")`)
        window.setLoadingProgress = function(percent, message) {
            percent = Math.min(Math.max(percent, 0), 100);
            
            fill.style.width = percent + "%";
            
            if (message && percent < 100) {
                msg.innerText = message;
            }

            // Increase shader intensity as it loads
            intensityValue = 0.4 + (percent / 100.0) * 0.6;

            if (percent >= 100) {
                // When fully loaded, prompt for ENTER
                fill.style.display = "none";
                document.querySelector('.progress-line').style.background = "transparent";
                msg.innerText = "[ PRESS ENTER ]";
                msg.classList.add("pulse");
            }
        };

        // Call this from Python on Enter key press
        window.triggerEnter = function() {
            if (statusArea.style.opacity === "0") return; // Already triggered
            
            statusArea.style.opacity = "0";
            brandText.classList.add("loaded");
            document.title = "CINEMATIC_ENDED";
            
            // Drop intensity back to ambient background level
            let fade = setInterval(() => {
                intensityValue -= 0.02;
                if (intensityValue <= 0.2) {
                    intensityValue = 0.2;
                    clearInterval(fade);
                }
            }, 50);
        };

        // Listen for user interactions since QWebEngineView eats focus
        window.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && document.querySelector('.status-text.pulse')) {
                window.triggerEnter();
            }
        });
        window.addEventListener("mousedown", (e) => {
            if (document.querySelector('.status-text.pulse')) {
                window.triggerEnter();
            }
        });

        // Initialize state
        window.setLoadingProgress(0, "Awaiting Telemetry...");
    </script>
</body>
</html>
